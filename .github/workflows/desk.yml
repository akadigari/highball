name: desk
# Seven runs a day, all UTC. GitHub crons run late sometimes, and a
# late run can miss a whole entry window (it happened on day two), so
# every window gets a backup tick about 90 minutes later. The
# one-position-per-city-per-day guard makes double entries impossible.
# 00:15 + 01:45 cover the eastern and central evening windows, 03:15 +
# 04:45 cover mountain and pacific evenings, 13:00 + 13:45 settle,
# train, and cover eastern and central mornings, 17:30 is exit patrol.
on:
  schedule:
    - cron: "15 0 * * *"
    - cron: "45 1 * * *"
    - cron: "15 3 * * *"
    - cron: "45 4 * * *"
    - cron: "0 13 * * *"
    - cron: "45 13 * * *"
    - cron: "30 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: run the desk
        run: python3 desk.py
      - name: commit the receipts
        run: |
          git config user.name "highball-desk"
          git config user.email "desk@users.noreply.github.com"
          git add data out model/history.csv
          git diff --cached --quiet || git commit -m "desk run: snapshots, ledger, training tape"
          git push
